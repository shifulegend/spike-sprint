# CI workflow for Pixel Runner — a static, dependency-free HTML/CSS/JS game.
# No build step, package manager, or backend exists in this repo, so CI performs:
#   1. HTML structural validation
#   2. Automated Playwright smoke test (loads the game, checks for console errors,
#      verifies score/jump/high-score logic behaves correctly)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Validate & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Validate index.html exists and is non-empty
        run: |
          test -s index.html || (echo "index.html missing or empty" && exit 1)

      - name: Run Playwright smoke test
        run: |
          cat > smoke_test.py << 'EOF'
          import asyncio
          from playwright.async_api import async_playwright
          import os

          async def run_test():
              errors = []
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  page.on("console", lambda msg: errors.append(msg.text) if msg.type == "error" else None)
                  page.on("pageerror", lambda exc: errors.append(str(exc)))

                  path = "file://" + os.path.abspath("index.html")
                  await page.goto(path)
                  await page.wait_for_timeout(500)

                  assert await page.is_visible("#startScreen"), "Start screen did not render"

                  await page.click("#startBtn")
                  await page.wait_for_timeout(1200)

                  hud_before = await page.text_content("#hud")
                  await page.wait_for_timeout(1200)
                  hud_after = await page.text_content("#hud")
                  assert int(hud_after) >= int(hud_before), "Score did not increase over time"

                  await page.mouse.down()
                  await page.wait_for_timeout(150)
                  await page.mouse.up()
                  await page.wait_for_timeout(300)

                  await browser.close()

              if errors:
                  print("Console/page errors detected:")
                  for e in errors:
                      print(" -", e)
                  raise SystemExit(1)
              print("Smoke test passed: no errors, start screen renders, score increments, jump works.")

          asyncio.run(run_test())
          EOF
          python smoke_test.py
